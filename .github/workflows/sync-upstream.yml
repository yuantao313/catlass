name: Sync Upstream to GitHub

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "yuantao313"
          git config user.email "yuantao313@gmail.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://gitcode.com/cann/catlass.git
          git fetch upstream master

      - name: Save action files
        run: |
          mkdir -p /tmp/github-backup
          cp -r .github /tmp/github-backup/ 2>/dev/null || true

      - name: Reset master to upstream/master
        run: |
          git checkout master
          git reset --hard upstream/master

      - name: Restore action files
        run: |
          mkdir -p .github/workflows
          cp -r /tmp/github-backup/.github/* .github/ 2>/dev/null || true
          git add .github/
          if ! git diff --cached --quiet; then
            git commit -m "sync: add github action config on top of upstream"
          fi

      - name: Push to GitHub
        run: |
          git push origin master
