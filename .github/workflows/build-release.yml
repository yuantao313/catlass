name: Build and Release optest

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: catlass-build
          auto-activate-base: false

      - name: Configure conda package cache
        shell: bash -el {0}
        run: conda config --set pkgs_dirs ~/conda_pkgs_dir

      - name: Cache conda packages
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/conda_pkgs_dir
          key: ${{ runner.os }}-conda-${{ hashFiles('environment.ascend950.yml', 'environment.yml') }}

      - name: Create conda environment
        shell: bash -el {0}
        run: |
          pip install pyyaml
          python3 -c "
import yaml
from packaging.version import Version

with open('environment.ascend950.yml') as f:
    e1 = yaml.safe_load(f)
with open('environment.yml') as f:
    e2 = yaml.safe_load(f)

channels = []
seen = set()
for c in e1.get('channels', []) + e2.get('channels', []):
    if c not in seen:
        channels.append(c)
        seen.add(c)

dep_map = {}
for d in e1.get('dependencies', []) + e2.get('dependencies', []):
    if isinstance(d, str):
        if '>=' in d:
            pkg, ver = d.split('>=', 1)
            if pkg in dep_map:
                old = dep_map[pkg].split('>=')[1]
                if Version(ver) > Version(old):
                    dep_map[pkg] = d
            else:
                dep_map[pkg] = d
        else:
            dep_map[d] = d

merged = {'name': 'catlass-build', 'channels': channels, 'dependencies': list(dep_map.values())}
with open('/tmp/merged-env.yml', 'w') as f:
    yaml.dump(merged, f)
"
          conda env create -f /tmp/merged-env.yml

      - name: Install pip dependencies
        shell: bash -el {0}
        run: |
          pip install --upgrade pip
          pip install torch torch-npu --extra-index-url https://download.pytorch.org/whl/cpu


      - name: Build optest wheel
        shell: bash -el {0}
        working-directory: tests/optest
        run: |
          bash build.sh

      - name: Determine release tag
        id: tag
        shell: bash -el {0}
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "release_tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          files: tests/optest/dist/*.whl
          generate_release_notes: true

      - name: Notify Feishu
        if: always()
        shell: bash
        env:
          JOB_STATUS: ${{ job.status }}
          TAG: ${{ steps.tag.outputs.release_tag || 'unknown' }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            EMOJI="✅"; TITLE="构建成功"; COLOR="green"
          else
            EMOJI="❌"; TITLE="构建失败"; COLOR="red"
          fi
          BODY=$(cat <<ENDJSON
          {
            "msg_type": "interactive",
            "card": {
              "header": {
                "title": {"tag": "plain_text", "content": "${EMOJI} catlass optest ${TITLE}"},
                "template": "${COLOR}"
              },
              "elements": [
                {"tag": "div", "text": {"tag": "lark_md", "content": "**Tag**: ${TAG}\n**Status**: ${JOB_STATUS}"}},
                {"tag": "hr"},
                {"tag": "div", "text": {"tag": "lark_md", "content": "[查看运行日志](${RUN_URL})"}}
              ]
            }
          }
          ENDJSON
          )
          curl -s -X POST "https://open.feishu.cn/open-apis/bot/v2/hook/3ad1f23c-2e58-476c-a2cd-9fbb46217146" \
            -H "Content-Type: application/json" -d "$BODY"
